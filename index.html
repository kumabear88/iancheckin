<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園自助點名系統</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #f3f4f6;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #dbeafe;
            --indigo: #4f46e5;
            --indigo-hover: #4338ca;
            --indigo-light: #e0e7ff;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #ea580c;
            --warning-bg: #ffedd5;
            --info: #0284c7;
            --info-bg: #e0f2fe;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-800: #1f2937;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 0.75rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--gray-800);
            min-height: 100vh;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .w-full { width: 100%; }
        .font-bold { font-weight: 700; }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        
        /* Navigation */
        nav {
            background-color: var(--white);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .nav-container {
            max-width: 64rem;
            margin: 0 auto;
            padding: 0 1rem;
            height: 3.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand {
            color: var(--primary-hover);
            font-weight: bold;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-buttons button {
            background: transparent;
            border: none;
            padding: 0.375rem 1rem;
            border-radius: 9999px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--gray-500);
        }
        .nav-buttons button:hover { background-color: var(--gray-100); }
        .nav-buttons button.active-student { background-color: var(--primary-light); color: var(--primary-hover); }
        .nav-buttons button.active-teacher { background-color: var(--indigo-light); color: var(--indigo-hover); }

        /* Main Container */
        main { padding: 2rem 1rem; max-width: 64rem; margin: 0 auto; min-height: 80vh; }

        /* Card Styles */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .card-header { padding: 1.5rem; color: white; text-align: center; }
        .card-header.student { background-color: var(--primary); }
        .card-header.teacher { background-color: var(--indigo); }
        .card-body { padding: 1.5rem; }

        /* Forms */
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--gray-800); }
        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: var(--primary); }
        select:disabled { background-color: var(--gray-100); opacity: 0.7; }
        
        .form-group { margin-bottom: 1.25rem; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            gap: 0.5rem;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }
        .btn-indigo { background-color: var(--indigo); color: white; }
        .btn-indigo:hover:not(:disabled) { background-color: var(--indigo-hover); }
        .btn-outline { background-color: var(--gray-100); color: var(--gray-800); }
        .btn-outline:hover { background-color: var(--gray-200); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.875rem; }
        .btn-group { display: flex; gap: 0.25rem; background: var(--gray-100); padding: 0.25rem; border-radius: 0.5rem; }
        .btn-group button { background: transparent; color: var(--gray-500); padding: 0.4rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; border: none; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .btn-group button.active { background: var(--white); color: var(--indigo); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* Alerts */
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .alert-success { background-color: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }
        .alert-error { background-color: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }

        /* Student Card Status Indicator */
        .student-info-box {
            background-color: var(--primary-light);
            border: 1px solid #bfdbfe;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .student-info-box p.title { color: var(--gray-500); font-size: 0.875rem; }
        .student-info-box p.name { color: var(--primary-hover); font-size: 1.25rem; font-weight: bold; margin-top: 0.25rem; }

        /* Teacher Dashboard Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .stat-box { padding: 0.75rem; border-radius: 0.5rem; text-align: center; border: 1px solid; }
        .stat-box span { display: block; }
        .stat-box .title { font-size: 0.75rem; font-weight: bold; margin-bottom: 0.25rem; }
        .stat-box .value { font-size: 1.5rem; font-weight: bold; }
        
        .stat-total { background-color: var(--gray-100); border-color: var(--gray-200); color: var(--gray-800); }
        .stat-present { background-color: var(--success-bg); border-color: #bbf7d0; color: var(--success); }
        .stat-late { background-color: var(--warning-bg); border-color: #fed7aa; color: var(--warning); }
        .stat-leave { background-color: var(--info-bg); border-color: #bae6fd; color: var(--info); }

        /* Student List Grid */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .student-card {
            position: relative;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 2px solid transparent;
            background-color: var(--gray-100);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .student-card:hover { background-color: var(--gray-200); }
        .student-card .seat { font-size: 0.75rem; font-weight: bold; opacity: 0.7; margin-bottom: 0.25rem; }
        .student-card .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 1.5rem; }
        .student-card .icon-abs { position: absolute; top: 0.5rem; right: 0.5rem; }
        .student-card.selected { border-color: var(--indigo); transform: scale(1.05); box-shadow: var(--shadow); z-index: 10; }
        .student-card.editing { cursor: default; opacity: 0.9; }
        .student-card.editing:hover { background-color: var(--gray-100); }

        /* Table View */
        .table-responsive { overflow-x: auto; margin-top: 1rem; border-radius: 0.5rem; border: 1px solid var(--gray-200); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; text-align: left; }
        th, td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--gray-200); font-size: 0.95rem; }
        th { background-color: var(--gray-100); font-weight: bold; color: var(--gray-500); }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f9fafb; }
        .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: bold; gap: 0.25rem;}

        /* Status Colors for Student Cards & Badges */
        .status-present { background-color: var(--success-bg); border-color: #bbf7d0; color: #166534; }
        .status-late { background-color: var(--warning-bg); border-color: #fed7aa; color: #9a3412; }
        .status-leave { background-color: var(--info-bg); border-color: #bae6fd; color: #075985; }
        .status-missing { background-color: var(--gray-200); color: var(--gray-500); }

        .delete-btn {
            color: var(--danger);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 50%;
        }
        .delete-btn:hover { background-color: var(--danger-bg); }

        /* Modal / Action Bar */
        .modal-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            border-top: 1px solid var(--gray-200);
            padding: 1rem;
            z-index: 50;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-content {
            max-width: 64rem;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        /* Layout Helpers */
        .col-span-1 { grid-column: span 1 / span 1; }
        .col-span-3 { grid-column: span 3 / span 3; }
        @media (min-width: 768px) {
            .md-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
            .md-flex-row { flex-direction: row; align-items: center; justify-content: space-between; }
        }

        /* SVG Icons */
        svg { width: 1.25rem; height: 1.25rem; }
        .icon-lg { width: 4rem; height: 4rem; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="nav-brand">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                校園自助點名
            </div>
            <div class="nav-buttons">
                <button id="nav-student" class="active-student" onclick="switchView('student')">學生點名</button>
                <button id="nav-teacher" onclick="switchView('teacherLogin')">老師管理</button>
            </div>
        </div>
    </nav>

    <main>
        <!-- ================= STUDENT VIEW ================= -->
        <div id="view-student" class="flex flex-col items-center justify-center">
            <div class="card" style="width: 100%; max-width: 28rem;">
                <div class="card-header student">
                    <svg class="icon-lg" style="margin: 0 auto 0.5rem auto; opacity: 0.9;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
                    <h1 class="text-2xl font-bold">學生自助點名系統</h1>
                    <p class="text-sm" style="color: var(--primary-light); margin-top: 0.25rem;">每人每週限點名一次</p>
                </div>
                <div class="card-body">
                    <div id="student-alert" class="alert hidden">
                        <svg id="alert-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"></svg>
                        <span id="alert-text"></span>
                    </div>

                    <div class="form-group">
                        <label>請選擇班級</label>
                        <select id="student-class-select" onchange="onStudentClassChange()">
                            <option value="">-- 選擇班級 --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>請選擇座號</label>
                        <select id="student-seat-select" disabled onchange="onStudentSeatChange()">
                            <option value="">-- 選擇座號 --</option>
                        </select>
                    </div>

                    <div id="student-info-display" class="student-info-box hidden">
                        <p class="title">確認身分</p>
                        <p id="student-info-text" class="name"></p>
                    </div>

                    <button id="btn-checkin" class="btn btn-primary w-full text-xl" style="padding: 1rem;" disabled onclick="handleCheckIn()">
                        立即報到
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= TEACHER LOGIN VIEW ================= -->
        <div id="view-teacherLogin" class="flex flex-col items-center justify-center hidden">
            <div class="card text-center" style="width: 100%; max-width: 24rem;">
                <div class="card-body" style="padding: 2rem;">
                    <div style="width: 4rem; height: 4rem; background: var(--indigo-light); color: var(--indigo); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem auto;">
                        <svg style="width: 2rem; height: 2rem;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-4" style="margin-bottom: 1.5rem;">老師後台登入</h2>
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <input type="password" id="login-password" placeholder="請輸入密碼" style="text-align: center;">
                            <p id="login-error" class="hidden" style="color: var(--danger); font-size: 0.875rem; margin-top: 0.5rem;">密碼錯誤，請重新輸入</p>
                        </div>
                        <button type="submit" class="btn btn-indigo w-full">登入</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ================= TEACHER DASHBOARD VIEW ================= -->
        <div id="view-teacher" class="hidden" style="padding-bottom: 6rem;">
            <!-- Header -->
            <div class="card card-body flex md-flex-row gap-4">
                <div>
                    <h1 class="text-2xl font-bold flex items-center gap-2">
                        <svg style="color: var(--indigo);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9 12l2 2 4-4"></path></svg>
                        教師點名後台
                    </h1>
                    <p id="teacher-week-display" class="text-sm" style="color: var(--gray-500); margin-top: 0.25rem;"></p>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-outline btn-sm" onclick="handleLogout()">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        登出
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="switchView('student')">回前台</button>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="md-grid" style="margin-bottom: 1.5rem;">
                <div class="card card-body col-span-1 flex flex-col justify-between" style="margin-bottom: 0;">
                    <div>
                        <label class="text-sm">切換班級</label>
                        <select id="teacher-class-select" onchange="onTeacherClassChange()" style="margin-bottom: 1rem;"></select>
                    </div>
                    <button id="btn-toggle-edit" class="btn btn-indigo w-full flex items-center justify-center gap-2" style="background-color: var(--indigo-light); color: var(--indigo);" onclick="toggleEditMode()">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <span>編輯學生名單</span>
                    </button>
                </div>
                <div class="col-span-3 stats-grid">
                    <div class="stat-box stat-total"><span class="title">總人數</span><span class="value" id="stat-total">0</span></div>
                    <div class="stat-box stat-present"><span class="title">已報到</span><span class="value" id="stat-present">0</span></div>
                    <div class="stat-box stat-late"><span class="title">遲到</span><span class="value" id="stat-late">0</span></div>
                    <div class="stat-box stat-leave"><span class="title">請假</span><span class="value" id="stat-leave">0</span></div>
                </div>
            </div>

            <!-- Student List Section -->
            <div class="card card-body">
                <div class="flex md-flex-row flex-col gap-4" style="margin-bottom: 1rem;">
                    <div>
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <svg style="color: var(--gray-300);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <span id="teacher-class-title"></span>班點名紀錄
                            <span id="teacher-hint" style="font-weight: normal; font-size: 0.875rem; color: var(--gray-500);">(點擊卡片/按鈕可標記狀態)</span>
                        </h2>
                    </div>

                    <div class="flex gap-2 items-center">
                        <!-- View Toggle -->
                        <div class="btn-group">
                            <button id="btn-view-grid" class="active" onclick="setDisplayMode('grid')">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:1rem; height:1rem; vertical-align: text-bottom; margin-right: 2px;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>卡片
                            </button>
                            <button id="btn-view-list" onclick="setDisplayMode('list')">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:1rem; height:1rem; vertical-align: text-bottom; margin-right: 2px;"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>列表
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Add Student Form (Hidden by default) -->
                <form id="add-student-form" class="hidden flex gap-2 items-center mb-4" style="background: var(--gray-100); padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--gray-200);" onsubmit="handleAddStudent(event)">
                    <input type="number" id="add-seat" placeholder="座號" required style="width: 5rem; padding: 0.4rem; font-size: 0.875rem;">
                    <input type="text" id="add-name" placeholder="學生姓名" required style="width: 8rem; padding: 0.4rem; font-size: 0.875rem;">
                    <button type="submit" class="btn btn-indigo btn-sm">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                        新增
                    </button>
                </form>

                <!-- Grid View -->
                <div id="teacher-student-grid" class="student-grid"></div>

                <!-- List/Table View -->
                <div id="teacher-student-list" class="hidden table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>座號</th>
                                <th>姓名</th>
                                <th>狀態</th>
                                <th>點名時間</th>
                                <th>操作管理</th>
                            </tr>
                        </thead>
                        <tbody id="teacher-student-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ================= ACTION MODAL ================= -->
        <div id="action-modal" class="modal-bottom hidden">
            <div class="modal-content">
                <div class="flex items-center gap-4">
                    <div id="modal-seat" style="width: 3rem; height: 3rem; background: var(--indigo-light); color: var(--indigo); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: bold;"></div>
                    <div>
                        <div id="modal-class" class="text-sm" style="color: var(--gray-500);"></div>
                        <div id="modal-name" class="text-xl font-bold"></div>
                    </div>
                </div>
                <div class="flex gap-2 w-full" style="flex: 1; justify-content: flex-end; flex-wrap: wrap;">
                    <button class="btn" style="background: var(--success-bg); color: var(--success);" onclick="handleMarkStatus('present')">已到</button>
                    <button class="btn" style="background: var(--warning-bg); color: var(--warning);" onclick="handleMarkStatus('late')">標記遲到</button>
                    <button class="btn" style="background: var(--info-bg); color: var(--info);" onclick="handleMarkStatus('leave')">標記請假</button>
                    <button class="btn btn-outline" style="padding: 0.75rem;" onclick="closeModal()">

        const state = {

        // ==========================================
        // 工具函數
        // ==========================================
        const getWeekIdentifier = (date = new Date()) => {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getUTCFullYear()}-W${weekNo}`;
        };

        const parseInitialData = () => {
            const lines = rawStudentData.split('\n');
            let currentClass = '';
            const data = {};
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                if (trimmed.length === 3 && !isNaN(trimmed)) {
                    currentClass = trimmed;
                    data[currentClass] = [];
                } else {
                    const parts = trimmed.split(/\s+/);
                    if (parts.length >= 2) {
                        let name = parts[1];
                        if (name === "你永遠不知道我叫什麼") name = "(未命名)";
                        data[currentClass].push({
                            seat: parts[0],
                            name: name,
                            id: `${currentClass}-${parts[0]}`
                        });
                    }
                }
            });
            return data;
        };

        // ==========================================
        // 初始化與本地儲存
        // ==========================================
        function initApp() {
            state.currentWeek = getWeekIdentifier();
            document.getElementById('teacher-week-display').innerText = `目前週數統計：${state.currentWeek}`;

            // 讀取 LocalStorage 或解析初始資料
            const savedStudents = localStorage.getItem('attendance_students');
            if (savedStudents) {
                state.studentsByClass = JSON.parse(savedStudents);
            } else {
                state.studentsByClass = parseInitialData();
                localStorage.setItem('attendance_students', JSON.stringify(state.studentsByClass));
            }

            const savedAttendance = localStorage.getItem('attendance_records');
            if (savedAttendance) {
                state.attendance = JSON.parse(savedAttendance);
            }

            state.classList = Object.keys(state.studentsByClass).sort();
            if(state.classList.length > 0) {
                state.activeClass = state.classList[0];
            }

            // 填充學生端班級選單
            const sClassSelect = document.getElementById('student-class-select');
            const tClassSelect = document.getElementById('teacher-class-select');
            sClassSelect.innerHTML = '<option value="">-- 選擇班級 --</option>';
            tClassSelect.innerHTML = '';
            
            state.classList.forEach(c => {
                sClassSelect.innerHTML += `<option value="${c}">${c} 班</option>`;
                tClassSelect.innerHTML += `<option value="${c}">${c} 班</option>`;
            });

            switchView('student');
        }

        function saveData() {
            localStorage.setItem('attendance_students', JSON.stringify(state.studentsByClass));
            localStorage.setItem('attendance_records', JSON.stringify(state.attendance));
        }

        // ==========================================
        // 視圖切換邏輯
        // ==========================================
        function switchView(viewName) {
            if (viewName === 'teacher' && !state.isAuthenticated) {
                viewName = 'teacherLogin';
            }
            
            state.view = viewName;
            
            document.getElementById('view-student').classList.add('hidden');
            document.getElementById('view-teacherLogin').classList.add('hidden');
            document.getElementById('view-teacher').classList.add('hidden');
            
            document.getElementById('nav-student').classList.remove('active-student');
            document.getElementById('nav-teacher').classList.remove('active-teacher');
            
            if (viewName === 'student') {
                document.getElementById('view-student').classList.remove('hidden');
                document.getElementById('nav-student').classList.add('active-student');
                // 清除學生端表單狀態
                clearStudentForm();
            } else if (viewName === 'teacherLogin') {
                document.getElementById('view-teacherLogin').classList.remove('hidden');
                document.getElementById('nav-teacher').classList.add('active-teacher');
                document.getElementById('login-password').value = '';
                document.getElementById('login-error').classList.add('hidden');
            } else if (viewName === 'teacher') {
                document.getElementById('view-teacher').classList.remove('hidden');
                document.getElementById('nav-teacher').classList.add('active-teacher');
                renderTeacherView();
            }
        }

        function setDisplayMode(mode) {
            state.displayMode = mode;
            document.getElementById('btn-view-grid').classList.toggle('active', mode === 'grid');
            document.getElementById('btn-view-list').classList.toggle('active', mode === 'list');
            renderTeacherView();
        }

        // ==========================================
        // 學生端邏輯
        // ==========================================
        let alertTimeout;
        function showStudentMessage(type, text) {
            const alertBox = document.getElementById('student-alert');
            const icon = document.getElementById('alert-icon');
            const textBox = document.getElementById('alert-text');
            
            alertBox.className = `alert ${type === 'success' ? 'alert-success' : 'alert-error'}`;
            icon.outerHTML = type === 'success' ? 
                Icons.check.replace('<svg', '<svg id="alert-icon"') : 
                Icons.error.replace('<svg', '<svg id="alert-icon"');
            textBox.innerText = text;
            
            clearTimeout(alertTimeout);
            if(type === 'success'){
                alertTimeout = setTimeout(clearStudentForm, 3000);
            }
        }

        function clearStudentForm() {
            document.getElementById('student-class-select').value = '';
            const seatSelect = document.getElementById('student-seat-select');
            seatSelect.innerHTML = '<option value="">-- 選擇座號 --</option>';
            seatSelect.disabled = true;
            document.getElementById('student-info-display').classList.add('hidden');
            document.getElementById('btn-checkin').disabled = true;
            document.getElementById('student-alert').classList.add('hidden');
        }

        function onStudentClassChange() {
            const classVal = document.getElementById('student-class-select').value;
            const seatSelect = document.getElementById('student-seat-select');
            document.getElementById('student-alert').classList.add('hidden');
            
            if (!classVal) {
                clearStudentForm();
                return;
            }
            
            seatSelect.disabled = false;
            seatSelect.innerHTML = '<option value="">-- 選擇座號 --</option>';
            state.studentsByClass[classVal].forEach(s => {
                seatSelect.innerHTML += `<option value="${s.seat}">${s.seat}號 - ${s.name}</option>`;
            });
            
            document.getElementById('student-info-display').classList.add('hidden');
            document.getElementById('btn-checkin').disabled = true;
        }

        function onStudentSeatChange() {
            const classVal = document.getElementById('student-class-select').value;
            const seatVal = document.getElementById('student-seat-select').value;
            const infoBox = document.getElementById('student-info-display');
            const infoText = document.getElementById('student-info-text');
            const btn = document.getElementById('btn-checkin');
            document.getElementById('student-alert').classList.add('hidden');

            if (classVal && seatVal) {
                const student = state.studentsByClass[classVal].find(s => s.seat === seatVal);
                infoText.innerHTML = `${classVal} 班 ${seatVal} 號<br/>${student.name}`;
                infoBox.classList.remove('hidden');
                btn.disabled = false;
            } else {
                infoBox.classList.add('hidden');
                btn.disabled = true;
            }
        }

        function handleCheckIn() {
            const classVal = document.getElementById('student-class-select').value;
            const seatVal = document.getElementById('student-seat-select').value;
            
            if (!classVal || !seatVal) {
                showStudentMessage('error', '請選擇班級與座號！');
                return;
            }

            const studentId = `${classVal}-${seatVal}`;
            const existingRecord = state.attendance[studentId];

            if (existingRecord && existingRecord.week === state.currentWeek && existingRecord.status === 'present') {
                showStudentMessage('error', '您本週已經完成點名了，不需重複報到！');
                return;
            }

            state.attendance[studentId] = {
                status: 'present',
                week: state.currentWeek,
                timestamp: new Date().toLocaleString('zh-TW')
            };
            saveData();
            showStudentMessage('success', '點名成功！祝您有美好的一天。');
            document.getElementById('btn-checkin').disabled = true; // 防止連點
        }

        // ==========================================
        // 老師登入邏輯
        // ==========================================
        function handleLogin(e) {
            e.preventDefault();
            const pass = document.getElementById('login-password').value;
            if (pass === '0316') {
                state.isAuthenticated = true;
                switchView('teacher');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function handleLogout() {
            state.isAuthenticated = false;
            switchView('teacherLogin');
        }

        // ==========================================
        // 老師後台邏輯
        // ==========================================
        function onTeacherClassChange() {
            state.activeClass = document.getElementById('teacher-class-select').value;
            state.isEditing = false;
            closeModal();
            renderTeacherView();
        }

        function toggleEditMode() {
            state.isEditing = !state.isEditing;
            closeModal();
            renderTeacherView();
        }

        function renderTeacherView() {
            document.getElementById('teacher-class-title').innerText = state.activeClass;
            
            const students = state.studentsByClass[state.activeClass] || [];
            
            // 統計
            let present = 0, late = 0, leave = 0, missing = 0;
            students.forEach(s => {
                const record = state.attendance[s.id];
                if (!record || record.week !== state.currentWeek) missing++;
                else {
                    if (record.status === 'present') present++;
                    if (record.status === 'late') late++;
                    if (record.status === 'leave') leave++;
                }
            });

            document.getElementById('stat-total').innerText = students.length;
            document.getElementById('stat-present').innerText = present;
            document.getElementById('stat-late').innerText = late;
            document.getElementById('stat-leave').innerText = leave;

            // UI 狀態更新
            const btnEdit = document.getElementById('btn-toggle-edit');
            const formAdd = document.getElementById('add-student-form');
            const hint = document.getElementById('teacher-hint');
            
            if (state.isEditing) {
                btnEdit.style.backgroundColor = "var(--indigo)";
                btnEdit.style.color = "white";
                btnEdit.querySelector('span').innerText = "完成編輯";
                formAdd.classList.remove('hidden');
                hint.innerText = "(編輯模式中)";
                hint.style.color = "var(--indigo)";
            } else {
                btnEdit.style.backgroundColor = "var(--indigo-light)";
                btnEdit.style.color = "var(--indigo)";
                btnEdit.querySelector('span').innerText = "編輯學生名單";
                formAdd.classList.add('hidden');
                hint.innerText = state.displayMode === 'grid' ? "(點擊卡片可標記狀態)" : "(點擊操作按鈕可標記狀態)";
                hint.style.color = "var(--gray-500)";
            }

            // 渲染列表視圖 / 卡片視圖
            const grid = document.getElementById('teacher-student-grid');
            const list = document.getElementById('teacher-student-list');
            const tbody = document.getElementById('teacher-student-tbody');
            
            if (state.displayMode === 'grid') {
                grid.classList.remove('hidden');
                list.classList.add('hidden');
                grid.innerHTML = '';
            } else {
                grid.classList.add('hidden');
                list.classList.remove('hidden');
                tbody.innerHTML = '';
            }

            students.forEach(student => {
                const record = state.attendance[student.id];
                const isRecordValid = record && record.week === state.currentWeek;
                const status = isRecordValid ? record.status : 'missing';
                const timestamp = isRecordValid ? record.timestamp : '-';
                
                let textStatus = '未到';
                let badgeClass = 'status-missing';
                let iconHtml = '';

                if (status === 'present') { textStatus = '已到'; badgeClass = 'status-present'; iconHtml = `<div class="icon-abs" style="color:var(--success);">${Icons.check}</div>`; }
                else if (status === 'late') { textStatus = '遲到'; badgeClass = 'status-late'; iconHtml = `<div class="icon-abs" style="color:var(--warning);">${Icons.clock}</div>`; }
                else if (status === 'leave') { textStatus = '請假'; badgeClass = 'status-leave'; iconHtml = `<div class="icon-abs" style="color:var(--info);">${Icons.calendarOff}</div>`; }

                if (state.isEditing) {
                    iconHtml = `<div class="icon-abs delete-btn" onclick="handleDeleteStudent(event, '${student.id}', '${student.name}')">${Icons.trash}</div>`;
                }

                // Grid 版卡片
                if (state.displayMode === 'grid') {
                    let cardClass = `student-card ${badgeClass === 'status-missing' ? '' : badgeClass}`;
                    if(state.isEditing) cardClass += ' editing';

                    const cardHtml = `
                        <div id="card-${student.id}" class="${cardClass}" onclick="openModal('${student.id}', '${student.seat}', '${student.name}')">
                            <div class="seat">${student.seat}</div>
                            <div class="name">${student.name}</div>
                            ${iconHtml}
                        </div>
                    `;
                    grid.innerHTML += cardHtml;
                } 
                // List 版表格
                else {
                    let actionHtml = '';
                    if (state.isEditing) {
                        actionHtml = `<button class="delete-btn" style="border:none; background:none;" onclick="handleDeleteStudent(event, '${student.id}', '${student.name}')">${Icons.trash}</button>`;
                    } else {
                        actionHtml = `<button class="btn btn-outline btn-sm" onclick="openModal('${student.id}', '${student.seat}', '${student.name}')">變更狀態</button>`;
                    }

                    const rowHtml = `
                        <tr>
                            <td class="font-bold text-gray-500">${student.seat}</td>
                            <td class="font-bold">${student.name}</td>
                            <td><span class="badge ${badgeClass}">${textStatus}</span></td>
                            <td style="color: var(--gray-500); font-size: 0.875rem;">${timestamp}</td>
                            <td>${actionHtml}</td>
                        </tr>
                    `;
                    tbody.innerHTML += rowHtml;
                }
            });
        }

        // ==========================================
        // 增刪學生與點名操作
        // ==========================================
        function handleAddStudent(e) {
            e.preventDefault();
            const seatInput = document.getElementById('add-seat').value;
            const nameInput = document.getElementById('add-name').value;
            
            if (!seatInput || !nameInput) return alert("請輸入座號與姓名");
            
            const seatNumStr = seatInput.padStart(2, '0');
            const students = state.studentsByClass[state.activeClass];
            
            if (students.some(s => s.seat === seatNumStr)) {
                return alert("此座號已存在！");
            }

            const newStudent = {
                seat: seatNumStr,
                name: nameInput,
                id: `${state.activeClass}-${seatNumStr}`
            };

            students.push(newStudent);
            students.sort((a, b) => parseInt(a.seat) - parseInt(b.seat));
            
            saveData();
            document.getElementById('add-seat').value = '';
            document.getElementById('add-name').value = '';
            renderTeacherView();
        }

        function handleDeleteStudent(e, studentId, studentName) {
            e.stopPropagation(); // 阻止觸發卡片點擊事件
            if (confirm(`確定要刪除學生 ${studentName} 嗎？\n(相關的點名紀錄不會自動刪除)`)) {
                state.studentsByClass[state.activeClass] = state.studentsByClass[state.activeClass].filter(s => s.id !== studentId);
                saveData();
                renderTeacherView();
            }
        }

        function openModal(id, seat, name) {
            if (state.isEditing) return; // 編輯模式不開啟狀態選單
            
            // 移除其他卡片的 selected 狀態
            document.querySelectorAll('.student-card').forEach(el => el.classList.remove('selected'));
            const cardEl = document.getElementById(`card-${id}`);
            if(cardEl) cardEl.classList.add('selected');

            state.selectedStudent = { id, seat, name };
            document.getElementById('modal-seat').innerText = seat;
            document.getElementById('modal-class').innerText = `${state.activeClass} 班`;
            document.getElementById('modal-name').innerText = name;
            
            document.getElementById('action-modal').classList.remove('hidden');
        }

        function closeModal() {
            state.selectedStudent = null;
            document.getElementById('action-modal').classList.add('hidden');
            document.querySelectorAll('.student-card').forEach(el => el.classList.remove('selected'));
        }

        function handleMarkStatus(status) {
            if (!state.selectedStudent) return;
            state.attendance[state.selectedStudent.id] = {
                status: status,
                week: state.currentWeek,
                timestamp: new Date().toLocaleString('zh-TW'),
                markedByTeacher: true
            };
            saveData();
            closeModal();
            renderTeacherView();
        }

        // 啟動應用程式
        window.onload = initApp;

    </script>
</body>
</html>
